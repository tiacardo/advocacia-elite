<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MeH31GYsgHRmGPSRDwlKJUJ4TF1enWh9525qJCx_Z30" />
    <title>ArchiLex | O Protocolo de Elite</title>
    
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    
    <style>
        :root { --navy: #020617; --gold: #D4AF37; --gold-dark: #996515; }
        body { background-color: var(--navy); color: #f8fafc; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: var(--gold); }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #020617; font-weight: 800; text-transform: uppercase; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="antialiased">

    <nav class="py-6 px-6 border-b border-white/5 text-center">
        <span class="serif italic text-2xl gold-text font-bold">ArchiLex</span>
    </nav>

    <section class="pt-12 pb-12 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6 serif italic gold-text">ArchiLex Protocolo de Elite</h1>
        <p class="text-gray-400 text-lg mb-8 max-w-2xl mx-auto">Transforme 3 horas de redação braçal em 45 segundos de revisão estratégica.</p>
        <button onclick="checkout()" class="btn-gold px-10 py-5 rounded-xl text-lg shadow-xl active:scale-95 transition-transform">Quero o Protocolo Agora</button>
    </section>

    <section class="py-12 px-6 bg-white/[0.02]">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-8">
                <h2 class="text-2xl serif italic gold-text">Análise Técnica ArchiLex</h2>
                <p class="text-gray-500 text-xs uppercase tracking-widest">O Futuro da Advocacia 2026</p>
            </div>
            <div class="relative aspect-video rounded-3xl overflow-hidden border-2 border-gold/30 shadow-2xl shadow-gold/10">
                <iframe class="absolute top-0 left-0 w-full h-full" src="https://www.youtube.com/embed/Dk1gi-BCEVQ" title="ArchiLex Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <section id="offer" class="py-20 px-6 text-center">
        <div class="max-w-2xl mx-auto glass-card p-12 rounded-[40px] border-2 border-gold/30">
            <p class="text-gray-500 line-through text-sm mb-2">R$ 297,00</p>
            <h2 class="text-6xl font-bold serif italic mb-6 gold-text">R$ 97</h2>
            <button onclick="checkout()" class="btn-gold w-full py-6 rounded-2xl text-2xl shadow-2xl active:scale-95 transition-transform">Adquirir Agora</button>
            <p class="text-[10px] text-gray-600 uppercase tracking-widest mt-6">Acesso Vitalício • Pagamento Único</p>
        </div>
    </section>

    <footer class="py-16 text-center border-t border-white/5">
        <p class="serif italic text-xl gold-text mb-2">ArchiLex</p>
        <p class="text-gray-600 text-[10px] uppercase tracking-[0.4em]">Engenharia Jurídica de Alta Performance</p>
    </footer>

    <script>
        lucide.createIcons();
        function checkout() { window.location.href = "https://pay.kiwify.com.br/extNhVa"; }
    </script>
</body>
</html>
